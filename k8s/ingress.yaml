apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: todo-ingress
  namespace: fullstack-app
spec:
  rules:
  - host: todoapp.test
    http:
      paths:

      # Backend FIRST
      - path: /todos
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 5000

      - path: /login
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 5000

      # Frontend LAST
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
